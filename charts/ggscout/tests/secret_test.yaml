---
# Test docs: https://github.com/helm-unittest/helm-unittest/blob/main/DOCUMENT.md
suite: test secret
values:
- ../test_values.yaml
templates:
- secret.yaml
tests:
- it: should work
  documentIndex: 0
  set:
    inventory:
      config:
        sources:
          kube:
            type: k8s
            config_source: kubeconfigfile
        gitguardian: null
  asserts:
  - isKind:
      of: Secret
  - matchRegex:
      path: metadata.name
      pattern: -ggscout$
  - equal:
      path: data["config.yml"]
      # Base64 encoded content of .Values.inventory.config. Helm 4 keeps explicit
      # `gitguardian: null` (helm 3 dropped null keys during coalescing), so it is
      # part of the rendered config:
      #   gitguardian: null
      #   sources:
      #     kube:
      #       config_source: kubeconfigfile
      #       type: k8s
      value: "Z2l0Z3VhcmRpYW46IG51bGwKc291cmNlczoKICBrdWJlOgogICAgY29uZmlnX3NvdXJjZToga3ViZWNvbmZpZ2ZpbGUKICAgIHR5cGU6IGs4cw=="
- it: should work
  documentIndex: 1
  set:
    caBundle.certs: "myCustomCertificate"
  asserts:
  - isKind:
      of: Secret
  - matchRegex:
      path: metadata.name
      pattern: -ggscout-ca-bundle$
  - equal:
      path: data["ca.crt"]
      # Base64 encoded content of .Values.caBundle.certs
      value: "bXlDdXN0b21DZXJ0aWZpY2F0ZQ=="
