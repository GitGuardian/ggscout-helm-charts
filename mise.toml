[tools]
helm = "latest"
nodejs = "lts"
# With uv installed, mise installs the pipx: tools below via uvx (uv tool
# install) instead of pipx->pip.
uv = "0.11.21"
"npm:@sourcemeta/jsonschema" = "10.0"
"pipx:pre-commit" = "latest"
"pipx:commitizen" = "latest"
# Pinned (not "latest") so generated docs are reproducible: a floating jsfh
# release would change the HTML output and trip the generate-docs CI gate.
"pipx:json-schema-for-humans" = "1.5.1"
